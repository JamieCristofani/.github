name: "🖥️ ✅ Task"
description: "A small, actionable unit of work."
title: "✅: "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: "What is the specific, actionable goal of this task?"
      placeholder: "e.g., Refactor `get_metadata` to handle missing 'Label' field."
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: "Any sub-steps for this task?"
      value: |
        - [ ] 
